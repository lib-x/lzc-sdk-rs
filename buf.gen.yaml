version: v2
clean: true
plugins:
  - local: protoc-gen-prost
    out: src/gen
    strategy: all
    opt:
      - bytes=.
      - file_descriptor_set
  - local: protoc-gen-tonic
    out: src/gen
    strategy: all
    opt:
      - no_transport
  - local: protoc-gen-prost-crate
    out: src/gen
    strategy: all
    opt:
      - include_file=mod.rs
      - no_features
